<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Lacuna">
  <defs>
    <style type="text/css">
      @import url("https://fonts.googleapis.com/css2?family=Lora:wght@700&amp;display=swap");
      .lacuna-mark-l {
        font-family: "Lora", Georgia, serif;
        font-weight: 700;
        font-size: 15px;
        fill: #c17f5a;
      }
    </style>
  </defs>
  <!-- Interior: white then ghost fill. Ring: white stroke only under dashes, then grey (gaps stay clear). -->
  <circle cx="16" cy="16" r="15.375" fill="#ffffff" />
  <circle cx="16" cy="16" r="15.375" fill="rgba(168, 181, 196, 0.38)" />
  <circle
    cx="16"
    cy="16"
    r="15.375"
    fill="none"
    stroke="#ffffff"
    stroke-width="1.25"
    stroke-dasharray="4.8 3.9"
    stroke-linecap="round"
  />
  <circle
    cx="16"
    cy="16"
    r="15.375"
    fill="none"
    stroke="rgba(168, 181, 196, 0.85)"
    stroke-width="1.25"
    stroke-dasharray="4.8 3.9"
    stroke-linecap="round"
  />
  <text x="16" y="16" class="lacuna-mark-l" text-anchor="middle" dominant-baseline="central">L</text>
</svg>
